version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumana
      POSTGRES_USER: lumana
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.4.0
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterKey
    ports:
      - "7700:7700"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./.env.example
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - meilisearch

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file:
      - ./.env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db-data:
